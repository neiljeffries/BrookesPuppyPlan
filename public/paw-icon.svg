<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#039be5"/>
      <stop offset="50%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#81d4fa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Main pad -->
  <ellipse cx="256" cy="320" rx="90" ry="75" fill="#ffffff"/>
  <!-- Top-left toe -->
  <ellipse cx="150" cy="208" rx="42" ry="52" transform="rotate(-20 150 208)" fill="#ffffff"/>
  <!-- Inner-left toe -->
  <ellipse cx="221" cy="172" rx="36" ry="48" transform="rotate(-8 221 172)" fill="#ffffff"/>
  <!-- Inner-right toe -->
  <ellipse cx="291" cy="172" rx="36" ry="48" transform="rotate(8 291 172)" fill="#ffffff"/>
  <!-- Top-right toe -->
  <ellipse cx="362" cy="208" rx="42" ry="52" transform="rotate(20 362 208)" fill="#ffffff"/>
</svg>
