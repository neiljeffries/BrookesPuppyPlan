<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="over" class="mobile-sidenav">
    <div class="sidenav-header">
      <span class="sidenav-paw">🐾</span>
      <span>Brooke's Puppy Plan</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" (click)="closeSidenav()">
        <mat-icon matListItemIcon>home</mat-icon> Home
      </a>
      <a mat-list-item routerLink="/about" routerLinkActive="active-link" (click)="closeSidenav()">
        <mat-icon matListItemIcon>info</mat-icon> About
      </a>
      <a mat-list-item routerLink="/training" routerLinkActive="active-link" (click)="closeSidenav()">
        <mat-icon matListItemIcon>school</mat-icon> Training
      </a>
      <a mat-list-item routerLink="/notes" routerLinkActive="active-link" (click)="closeSidenav()">
        <mat-icon matListItemIcon>sticky_note_2</mat-icon> Notes
      </a>
      <a mat-list-item routerLink="/contact" routerLinkActive="active-link" (click)="closeSidenav()">
        <mat-icon matListItemIcon>mail</mat-icon> Contact
      </a>
      <a mat-list-item routerLink="/livestream" routerLinkActive="active-link" (click)="closeSidenav()">
        <mat-icon matListItemIcon>live_tv</mat-icon> Dog Whisperer
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <button mat-icon-button class="menu-button" (click)="sidenav.toggle()" aria-label="Toggle navigation menu">
        <mat-icon>menu</mat-icon>
      </button>
      <a mat-button routerLink="/" class="brand">
        <span class="brand-paw">🐾</span>
        Brooke's Puppy Plan
      </a>
      <span class="spacer"></span>
      <nav class="desktop-nav">
        <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
          <mat-icon>home</mat-icon> Home
        </a>
        <span class="bone-divider">🦴</span>
        <a mat-button routerLink="/about" routerLinkActive="active-link" class="nav-link">
          <mat-icon>info</mat-icon> About
        </a>
        <span class="bone-divider">🦴</span>
        <a mat-button routerLink="/training" routerLinkActive="active-link" class="nav-link">
          <mat-icon>school</mat-icon> Training
        </a>
        <span class="bone-divider">🦴</span>
        <a mat-button routerLink="/notes" routerLinkActive="active-link" class="nav-link">
          <mat-icon>sticky_note_2</mat-icon> Notes
        </a>
        <span class="bone-divider">🦴</span>
        <a mat-button routerLink="/contact" routerLinkActive="active-link" class="nav-link">
          <mat-icon>mail</mat-icon> Contact
        </a>
        <span class="bone-divider">🦴</span>
        <a mat-button routerLink="/livestream" routerLinkActive="active-link" class="nav-link">
          <mat-icon>live_tv</mat-icon> Dog Whisperer
        </a>
      </nav>
      <div class="toolbar-paws" aria-hidden="true">
        <span class="floating-paw paw-1">🐾</span>
        <span class="floating-paw paw-2">🐾</span>
        <span class="floating-paw paw-3">🐾</span>
        <span class="floating-paw paw-4">🐾</span>
        <span class="floating-paw paw-5">🐾</span>
        <span class="floating-paw paw-6">🐾</span>
        <span class="floating-paw paw-7">🐾</span>
        <span class="floating-paw paw-8">🐾</span>
      </div>
    </mat-toolbar>

    <main class="main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
