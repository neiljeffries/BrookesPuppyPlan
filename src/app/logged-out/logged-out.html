<section class="logged-out">
  <mat-card>
    <mat-card-header>
      <mat-icon mat-card-avatar class="logout-icon">check_circle</mat-icon>
      <mat-card-title>You've been signed out</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>Thanks for visiting Brooke's Puppy Plan! 🐾</p>
      <p>You have been successfully signed out.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="signIn()">
        <mat-icon>login</mat-icon> Sign back in
      </button>
    </mat-card-actions>
  </mat-card>
</section>
