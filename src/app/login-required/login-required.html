<section class="login-required">
  <mat-card>
    <mat-card-header>
      <mat-icon mat-card-avatar class="lock-icon">lock</mat-icon>
      <mat-card-title>Login Required</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>You need to sign in to access this page.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="signIn()">
        <mat-icon>login</mat-icon> Sign in with Google
      </button>
    </mat-card-actions>
  </mat-card>
</section>
