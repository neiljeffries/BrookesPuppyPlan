<section class="login-required">
  <mat-card>
    <mat-card-header>
      <mat-icon mat-card-avatar class="lock-icon">lock</mat-icon>
      <mat-card-title>Login Required</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>You need to sign in to access this page.</p>
    </mat-card-content>
    <mat-card-actions>
      <div class="action-stack">
        <form class="email-form" (ngSubmit)="signInWithEmail()">
          <mat-form-field appearance="outline" class="email-field">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="email" name="email" autocomplete="username" />
          </mat-form-field>
          <mat-form-field appearance="outline" class="email-field">
            <mat-label>Password</mat-label>
            <input matInput type="password" [(ngModel)]="password" name="password" autocomplete="current-password" />
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit" [disabled]="!email || !password">
            <mat-icon>email</mat-icon> Sign in with Email
          </button>
          @if (error) {
            <p class="error-text">{{ error }}</p>
          }
          <a class="forgot-link" (click)="resetPassword()">Forgot password?</a>
        </form>
        <span class="divider-text">or</span>
        <button mat-stroked-button type="button" (click)="signInWithGoogle()">
          <mat-icon>login</mat-icon> Sign in with Google
        </button>
        <span class="divider-text">Don't have an account?</span>
        <a mat-stroked-button routerLink="/register">
          <mat-icon>person_add</mat-icon> Register
        </a>
      </div>
    </mat-card-actions>
  </mat-card>
</section>
